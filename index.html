<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>言想高塔 攻略Wiki</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #0f1419;
  color: #e6edf3;
}

/* ヘッダー */
header {
  background: #1f2a33;
  padding: 12px 20px;
  font-weight: bold;
  border-bottom: 1px solid #2f3b45;
}

/* 全体レイアウト */
.layout {
  display: grid;
  grid-template-columns: 220px 1fr 300px;
  height: calc(100vh - 50px);
}

/* サイドバー */
.sidebar {
  background: #161b22;
  border-right: 1px solid #2f3b45;
  padding: 10px;
}

.sidebar h3 {
  font-size: 14px;
  border-bottom: 1px solid #2f3b45;
  padding-bottom: 5px;
}

.char-item {
  padding: 6px;
  cursor: pointer;
  border-radius: 4px;
}

.char-item:hover {
  background: #2f3b45;
}

/* メイン（記事） */
.main {
  display: flex;
  flex-direction: column;
}

/* エディタ */
textarea {
  width: 100%;
  height: 40%;
  background: #0d1117;
  color: #e6edf3;
  border: none;
  padding: 10px;
  font-size: 14px;
  resize: none;
}

/* プレビュー */
.preview {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

/* Wiki風装飾 */
.preview h1 {
  border-bottom: 2px solid #3b82f6;
}

.preview h2 {
  border-left: 4px solid #3b82f6;
  padding-left: 8px;
}

.preview table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

.preview th, .preview td {
  border: 1px solid #444;
  padding: 6px;
}

/* 右パネル */
.info {
  background: #161b22;
  border-left: 1px solid #2f3b45;
  padding: 10px;
}

.card {
  background: #0d1117;
  border: 1px solid #2f3b45;
  border-radius: 6px;
  padding: 10px;
  margin-bottom: 10px;
}

.stat {
  display: flex;
  justify-content: space-between;
  margin: 4px 0;
}

.bar {
  height: 6px;
  background: #333;
  border-radius: 3px;
  overflow: hidden;
}

.bar-inner {
  height: 100%;
  background: #3b82f6;
}

/* スクロール */
::-webkit-scrollbar {
  width: 6px;
}
::-webkit-scrollbar-thumb {
  background: #444;
}
</style>
</head>

<body>

<header>
  自作キャラポートフォリオ
</header>

<div class="layout">

  <!-- 左：キャラ一覧 -->
  <div class="sidebar">
    <h3>キャラクター</h3>
    <div class="char-item" onclick="loadChar('A')">キャラA</div>
    <div class="char-item" onclick="loadChar('B')">キャラB</div>
  </div>

  <!-- 中央：記事 -->
  <div class="main">
    <textarea id="input"></textarea>
    <div class="preview" id="preview"></div>
  </div>

  <!-- 右：ステータス -->
  <div class="info">
    <div class="card">
      <h3>ステータス</h3>

      <div class="stat">
        <span>HP</span><span id="hpVal">1200</span>
      </div>
      <div class="bar"><div class="bar-inner" style="width:80%"></div></div>

      <div class="stat">
        <span>ATK</span><span id="atkVal">500</span>
      </div>
      <div class="bar"><div class="bar-inner" style="width:60%"></div></div>

      <div class="stat">
        <span>DEF</span><span id="defVal">300</span>
      </div>
      <div class="bar"><div class="bar-inner" style="width:40%"></div></div>

    </div>
  </div>

</div>

<script>
const input = document.getElementById("input");
const preview = document.getElementById("preview");

const data = {
  A: `# キャラA

## 基本情報
- 種族：〇〇
- クラス：前衛

## スキル
- スキル1：攻撃力アップ
- スキル2：範囲攻撃

## 説明
ここに設定を書く`,
  
  B: `# キャラB

## 基本情報
- 種族：△△
- クラス：術師

## スキル
- スキル1：範囲魔法
- スキル2：デバフ

## 説明
別キャラの説明`
};

function loadChar(name) {
  input.value = data[name];
  update();
}

function update() {
  preview.innerHTML = marked.parse(input.value);
}

input.addEventListener("input", update);

loadChar("A");
</script>

</body>
</html>
