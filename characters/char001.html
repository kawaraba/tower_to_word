<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>キャラ詳細</title>
<link rel="stylesheet" href="../style.css">

<style>
/* タブ風 */
.tabs {
  display: flex;
  border-bottom: 2px solid #ccc;
  margin-bottom: 10px;
}

.tab {
  padding: 10px 15px;
  cursor: pointer;
  background: #ecf0f1;
  margin-right: 5px;
}

.tab.active {
  background: white;
  border: 1px solid #ccc;
  border-bottom: none;
}

/* タブ内容 */
.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

/* キャラヘッダー */
.char-header {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
}

.char-header img {
  width: 200px;
  height: 200px;
  object-fit: cover;
}

/* セクション */
.section {
  margin-bottom: 25px;
}

.section h2 {
  border-left: 5px solid #2c3e50;
  padding-left: 10px;
}
</style>
</head>

<body>

<header>キャラ詳細</header>

<div class="container">

<div class="sidebar">
  <a href="../index.html">トップ</a>
  <a href="../characters.html">キャラ一覧</a>
</div>

<div class="main">

<!-- ■ 基本情報 -->
<div class="section">
  <div class="char-header">
    <img src="../images/char1.png">
    <div>
      <h2>キャラ名</h2>
      <p class="rarity-5">★★★★★</p>
      <p>クラス：術師</p>
      <p>役割：アタッカー</p>
    </div>
  </div>
</div>

<!-- ■ ステータス -->
<div class="section">
  <h2>ステータス</h2>
  <table class="status-table">
    <tr><th>HP</th><td>2000</td></tr>
    <tr><th>攻撃</th><td>500</td></tr>
    <tr><th>防御</th><td>300</td></tr>
  </table>
</div>

<!-- ■ スキル -->
<div class="section">
  <h2>スキル</h2>

  <div class="tabs">
    <div class="tab active" onclick="openTab(0)">スキル1</div>
    <div class="tab" onclick="openTab(1)">スキル2</div>
    <div class="tab" onclick="openTab(2)">スキル3</div>
  </div>

  <div class="tab-content active">
    <p><strong>スキル1：</strong>説明を書く</p>
  </div>

  <div class="tab-content">
    <p><strong>スキル2：</strong>説明を書く</p>
  </div>

  <div class="tab-content">
    <p><strong>スキル3：</strong>説明を書く</p>
  </div>

</div>

<!-- ■ 素質 -->
<div class="section">
  <h2>素質</h2>
  <p>素質の説明を書く</p>
</div>

<!-- ■ 基地スキル -->
<div class="section">
  <h2>基地スキル</h2>
  <p>基地スキルの説明を書く</p>
</div>

<!-- ■ モジュール -->
<div class="section">
  <h2>モジュール</h2>
  <p>モジュールの説明を書く</p>
</div>

<!-- ■ 総評 -->
<div class="section">
  <h2>総評</h2>
  <p>評価を書く</p>
</div>

</div>
</div>

<script>
function openTab(index) {
  const tabs = document.querySelectorAll(".tab");
  const contents = document.querySelectorAll(".tab-content");

  tabs.forEach(t => t.classList.remove("active"));
  contents.forEach(c => c.classList.remove("active"));

  tabs[index].classList.add("active");
  contents[index].classList.add("active");
}
</script>

</body>
</html>
