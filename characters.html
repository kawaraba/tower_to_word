<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>キャラクター一覧</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f6f7;
}

header {
  background: #2c3e50;
  color: white;
  padding: 15px;
}

.container {
  display: flex;
}

.sidebar {
  width: 250px;
  background: #34495e;
  color: white;
  min-height: 100vh;
  padding: 15px;
}

.sidebar a {
  display: block;
  color: white;
  text-decoration: none;
  padding: 8px 0;
}

.main {
  flex: 1;
  padding: 20px;
}

/* テーブル */
table {
  width: 560px;
  border-collapse: collapse;
  table-layout: fixed;
  background: #fff;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
}

th:nth-child(1),
td:nth-child(1) {
  width: 60px;
}

th:nth-child(2),
td:nth-child(2) {
  width: 200px;
}

th:nth-child(3),
td:nth-child(3) {
  width: 100px;
}

th:nth-child(4),
td:nth-child(4) {
  width: 120px;
}

th:nth-child(5),
td:nth-child(5) {
  width: 80px;
}

.char-img {
  width: 40px;
  height: 40px;
}

/* 画像 */
.char-img {
  width: 50px;
  height: 50px;
  object-fit: cover;
}

/* リンク装飾 */
a.char-link {
  text-decoration: none;
  color: #2c3e50;
  font-weight: bold;
}

a.char-link:hover {
  text-decoration: underline;
}

</style>
</head>

<body>

<header>キャラクター一覧</header>

<div class="container">

  <div class="sidebar">
    <a href="index.html">トップ</a>
    <a href="characters.html">キャラクター一覧</a>
  </div>

  <div class="main">

    <h2>キャラクター一覧</h2>

    <table>
      <tr>
        <th>画像</th>
        <th>名前</th>
        <th>レアリティ</th>
        <th>役割</th>
        <th>ポジション</th>
      </tr>

      <tr>
        <td><img src="images/クランベリー顔.png" class="char-img"></td>
        <td><a href="cranberry_detail.html" class="char-link">クランベリー形態素</a></td>
        <td>SSR</td>
        <td>アタッカー</td>
        <td>前衛</td>
      </tr>

      <tr>
        <td><img src="images/characters/char2.png" class="char-img"></td>
        <td><a href="char2.html" class="char-link">声調</a></td>
        <td>SR</td>
        <td>サポーター</td>
        <td>中衛</td>
      </tr>

    </table>

  </div>

</div>

</body>
</html>
