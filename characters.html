<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>キャラクター一覧</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f6f7;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
    }

    .container {
      display: flex;
    }

    .sidebar {
      width: 250px;
      background: #34495e;
      color: white;
      min-height: 100vh;
      padding: 15px;
    }

    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 8px 0;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 5px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #ddd;
    }

    .card a {
      text-decoration: none;
      color: black;
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<header>キャラクター一覧</header>

<div class="container">

  <div class="sidebar">
    <a href="index.html">トップ</a>
    <a href="characters.html">キャラクター一覧</a>
  </div>

  <div class="main">
    <h2>キャラクター一覧</h2>

    <div class="grid">

      <div class="card">
        <img src="images/クランベリー顔.png" alt="キャラ画像">
        <a href="cranberry_detail.html">クランベリー形態素</a>
      </div>

      <div class="card">
        <img src="" alt="キャラ画像">
        <a href="char2.html">サンプルキャラB</a>
      </div>

    </div>
  </div>

</div>

</body>
</html>
